AWSTemplateFormatVersion: "2010-09-09"
Description: "Metabolica - Digital Life Cultivation Infrastructure"

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  Ec2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 SSH key pair name
  Ec2Ami:
    Type: AWS::EC2::Image::Id
    Default: ami-007ea17fb9422e93f
    Description: Amazon Linux 2023 AMI (ap-northeast-1)

Resources:
  # ============================================================
  # S3 - Raw data + DNA sequence storage
  # ============================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "metabolica-data-${Env}-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30

  # ============================================================
  # DynamoDB - Life entity state management
  # ============================================================
  StateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "metabolica-state-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  DnaChainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "metabolica-dna-chain-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: day
          AttributeType: N
      KeySchema:
        - AttributeName: day
          KeyType: HASH


  # ============================================================
  # IAM - EC2 role
  # ============================================================
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "metabolica-ec2-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MetabolicaEc2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt StateTable.Arn
                  - !GetAtt DnaChainTable.Arn
              - Effect: Allow
                Action:
                  - comprehend:DetectSentiment
                  - comprehend:DetectKeyPhrases
                  - comprehend:DetectEntities
                Resource: "*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

  # ============================================================
  # EC2 - Python Daemon (heart of the life entity)
  # ============================================================
  DaemonSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Metabolica Daemon - SSH only
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  DaemonInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref Ec2Ami
      KeyName: !Ref Ec2KeyPair
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroups:
        - !Ref DaemonSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "metabolica-daemon-${Env}"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y python3.12 python3.12-pip git
          mkdir -p /opt/metabolica
          # TODO: git clone and systemd setup

  # ============================================================
  # API Gateway + Lambda - Expose life entity status via JSON API
  # ============================================================
  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "metabolica-api-lambda-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt StateTable.Arn
                  - !GetAtt DnaChainTable.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "metabolica-api-${Env}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ApiLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          STATE_TABLE: !Ref StateTable
          DNA_CHAIN_TABLE: !Ref DnaChainTable
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"status": "alive", "message": "Metabolica API - TODO"})
              }

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "metabolica-api-${Env}"

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: status

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: !Ref Env

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*"

Outputs:
  BucketName:
    Value: !Ref DataBucket

  StateTableName:
    Value: !Ref StateTable

  DnaChainTableName:
    Value: !Ref DnaChainTable

  DaemonInstanceId:
    Value: !Ref DaemonInstance

  DaemonPublicIp:
    Value: !GetAtt DaemonInstance.PublicIp

  ApiUrl:
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Env}/status"
