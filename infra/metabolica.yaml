AWSTemplateFormatVersion: "2010-09-09"
Description: "Metabolica — 電子生命育成計画 インフラ構成"

Parameters:
  Env:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  Ec2KeyPair:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 SSH key pair name
  Ec2Ami:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI

Resources:
  # ============================================================
  # S3 — 生データ + DNA配列の保存
  # ============================================================
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "metabolica-data-${Env}-${AWS::AccountId}"
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30

  # ============================================================
  # DynamoDB — 生命体のstate管理
  # ============================================================
  StateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "metabolica-state-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE

  DnaChainTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "metabolica-dna-chain-${Env}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: day
          AttributeType: N
      KeySchema:
        - AttributeName: day
          KeyType: HASH

  # ============================================================
  # SSM Parameter Store — APIキー等のシークレット管理
  # ============================================================
  ParamNewsApiKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/metabolica/${Env}/NEWSAPI_KEY"
      Type: String
      Value: "REPLACE_ME"
      Description: NewsAPI key

  ParamWeatherKey:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/metabolica/${Env}/OPENWEATHERMAP_KEY"
      Type: String
      Value: "REPLACE_ME"
      Description: OpenWeatherMap key

  # ============================================================
  # IAM — EC2用ロール
  # ============================================================
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "metabolica-ec2-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: MetabolicaEc2Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub "${DataBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:UpdateItem
                Resource:
                  - !GetAtt StateTable.Arn
                  - !GetAtt DnaChainTable.Arn
              - Effect: Allow
                Action:
                  - comprehend:DetectSentiment
                  - comprehend:DetectKeyPhrases
                  - comprehend:DetectEntities
                Resource: "*"
              - Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/metabolica/${Env}/*"

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

  # ============================================================
  # EC2 — Python Daemon（生命体の心臓）
  # ============================================================
  DaemonSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Metabolica Daemon - SSH only
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  DaemonInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref Ec2Ami
      KeyName: !Ref Ec2KeyPair
      IamInstanceProfile: !Ref Ec2InstanceProfile
      SecurityGroups:
        - !Ref DaemonSG
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub "metabolica-daemon-${Env}"
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y python3.12 python3.12-pip git
          mkdir -p /opt/metabolica
          # TODO: git clone and systemd setup

  # ============================================================
  # IAM — Lambda蘇生関数用ロール
  # ============================================================
  ResurrectLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "metabolica-resurrect-lambda-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: Ec2StartStop
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                  - ec2:DescribeInstances
                Resource: "*"

  # ============================================================
  # Lambda — EC2自動停止を突破する不死機構
  # ============================================================
  ResurrectFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "metabolica-resurrect-${Env}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ResurrectLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          INSTANCE_ID: !Ref DaemonInstance
      Code:
        ZipFile: |
          import boto3
          import os

          def handler(event, context):
              ec2 = boto3.client("ec2", region_name=os.environ.get("AWS_REGION", "ap-northeast-1"))
              instance_id = os.environ["INSTANCE_ID"]
              state = ec2.describe_instances(InstanceIds=[instance_id])
              current = state["Reservations"][0]["Instances"][0]["State"]["Name"]
              if current == "stopped":
                  ec2.start_instances(InstanceIds=[instance_id])
                  return {"status": "resurrected", "instance": instance_id}
              return {"status": "already_running", "instance": instance_id}

  # CloudWatch Events — 自動停止5分後に蘇生 (JST: 18:05, 20:05, 00:05)
  ResurrectRule1805:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "metabolica-resurrect-1805-${Env}"
      ScheduleExpression: "cron(5 9 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ResurrectFunction.Arn
          Id: resurrect

  ResurrectRule2005:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "metabolica-resurrect-2005-${Env}"
      ScheduleExpression: "cron(5 11 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ResurrectFunction.Arn
          Id: resurrect

  ResurrectRule0005:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "metabolica-resurrect-0005-${Env}"
      ScheduleExpression: "cron(5 15 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt ResurrectFunction.Arn
          Id: resurrect

  # Lambda invoke permissions for EventBridge
  ResurrectPermission1805:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResurrectFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResurrectRule1805.Arn

  ResurrectPermission2005:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResurrectFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResurrectRule2005.Arn

  ResurrectPermission0005:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResurrectFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ResurrectRule0005.Arn

  # ============================================================
  # API Gateway + Lambda — 生命体の状態をJSON APIで公開
  # ============================================================
  ApiLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "metabolica-api-lambda-${Env}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoReadOnly
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !GetAtt StateTable.Arn
                  - !GetAtt DnaChainTable.Arn

  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "metabolica-api-${Env}"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ApiLambdaRole.Arn
      Timeout: 10
      Environment:
        Variables:
          STATE_TABLE: !Ref StateTable
          DNA_CHAIN_TABLE: !Ref DnaChainTable
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"status": "alive", "message": "Metabolica API - TODO"})
              }

  ApiGateway:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "metabolica-api-${Env}"

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref ApiGateway
      ParentId: !GetAtt ApiGateway.RootResourceId
      PathPart: status

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref ApiGateway
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref ApiGateway
      StageName: !Ref Env

  ApiLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*"

Outputs:
  BucketName:
    Value: !Ref DataBucket

  StateTableName:
    Value: !Ref StateTable

  DnaChainTableName:
    Value: !Ref DnaChainTable

  DaemonInstanceId:
    Value: !Ref DaemonInstance

  DaemonPublicIp:
    Value: !GetAtt DaemonInstance.PublicIp

  ResurrectFunctionArn:
    Value: !GetAtt ResurrectFunction.Arn

  ApiUrl:
    Value: !Sub "https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/${Env}/status"
